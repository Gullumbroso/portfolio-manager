services:
  - type: web
    name: portfolio-manager-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
