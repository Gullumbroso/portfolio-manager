<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circle outline -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="black" stroke-width="4"/>

  <!-- Linear line: gentle upward slope from bottom-left to upper-right area -->
  <line x1="40" y1="150" x2="160" y2="70" stroke="black" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Exponential curve: starts flat then rises steeply -->
  <path d="M 40 155 Q 100 148, 125 120 Q 145 96, 160 40" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
</svg>
